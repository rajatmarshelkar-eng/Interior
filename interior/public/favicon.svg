<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  {/* Clean dark background */}
  <rect width="32" height="32" fill="#0A0A0A" />

  {/* Soft shadow base */}
  <defs>
    {/* Gold metallic gradient */}
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#D4AF37" />
      <stop offset="30%" stopColor="#FFD700" />
      <stop offset="70%" stopColor="#B8860B" />
      <stop offset="100%" stopColor="#D4AF37" />
    </linearGradient>

    {/* Embossed effect filter */}
    <filter id="emboss" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="1" specularConstant="1" specularExponent="20" lightingColor="#FFD700" result="specOut">
        <fePointLight x="-5000" y="-10000" z="20000"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut2"/>
      <feComposite in="SourceGraphic" in2="specOut2" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>

    {/* Soft shadow filter */}
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset in="blur" dx="0.5" dy="1" result="offset"/>
      <feFlood floodColor="#000000" floodOpacity="0.3" result="flood"/>
      <feComposite in="flood" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  {/* Shadow layer */}
  <g filter="url(#softShadow)" opacity="0.6">
    {/* Buildings shadow */}
    <g stroke="#000000" strokeWidth="0.8" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.4">
      <path d="M4 20 L4 14 L6 13.5 L6 20 Z" />
      <path d="M7 20 L7 10 L9 9.5 L9 20 Z" />
      <path d="M10 20 L10 16 L12 15.5 L12 20 Z" />
      <path d="M13 20 L13 6 L15 5.5 L15 20 Z" />
      <path d="M16 20 L16 16 L18 15.5 L18 20 Z" />
      <path d="M19 20 L19 10 L21 9.5 L21 20 Z" />
      <path d="M22 20 L22 14 L24 13.5 L24 20 Z" />
    </g>

    {/* Nest shadow */}
    <g stroke="#000000" strokeWidth="0.6" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.4">
      <path d="M11 22 Q12 21 13 22 Q14 21 15 22 Q15.5 23 15 24 Q14 24.5 13 24 Q12 24.5 11 24 Q10.5 23 11 22" />
      <path d="M12 23 Q12.5 22.5 13 23" />
      <path d="M13 22.5 Q13.5 22 14 22.5" />
    </g>

    {/* Bird shadow */}
    <g opacity="0.4">
      <ellipse cx="13" cy="19" rx="1" ry="0.8" fill="#000000" />
      <circle cx="14" cy="18" r="0.5" fill="#000000" />
    </g>
  </defs>

  {/* Main gold metallic lines with emboss effect */}
  <g filter="url(#emboss)" stroke="url(#goldGradient)" strokeWidth="0.6" fill="none" strokeLinecap="round" strokeLinejoin="round">
    {/* Symmetrical minimalist composition */}
    <g>
      {/* Left buildings */}
      <path d="M4 20 L4 14 L6 13.5 L6 20 Z" />
      <path d="M7 20 L7 10 L9 9.5 L9 20 Z" />
      <path d="M10 20 L10 16 L12 15.5 L12 20 Z" />

      {/* Center building */}
      <path d="M13 20 L13 6 L15 5.5 L15 20 Z" />

      {/* Right buildings - mirror */}
      <path d="M16 20 L16 16 L18 15.5 L18 20 Z" />
      <path d="M19 20 L19 10 L21 9.5 L21 20 Z" />
      <path d="M22 20 L22 14 L24 13.5 L24 20 Z" />
    </g>

    {/* Integrated nest structure */}
    <g>
      <path d="M11 22 Q12 21 13 22 Q14 21 15 22 Q15.5 23 15 24 Q14 24.5 13 24 Q12 24.5 11 24 Q10.5 23 11 22" />
      <path d="M12 23 Q12.5 22.5 13 23" />
      <path d="M13 22.5 Q13.5 22 14 22.5" />
      <path d="M9.5 24 Q10.5 23 11.5 24" />
      <path d="M14.5 24 Q15.5 23 16.5 24" />
    </g>

    {/* Minimalist bird */}
    <g>
      <ellipse cx="13" cy="19" rx="1" ry="0.8" />
      <circle cx="14" cy="18" r="0.5" />
      <path d="M14.3 18 L14.8 17.5" />
      <path d="M12.5 19 Q12 17.5 13 16.5" />
      <path d="M12 19.5 L11 20.5" />
      <circle cx="14.1" cy="17.8" r="0.08" fill="#FFD700" />
    </g>

    {/* Window details - minimal */}
    <g strokeWidth="0.4">
      <line x1="4.5" y1="15" x2="5.5" y2="14.8" />
      <line x1="4.5" y1="17" x2="5.5" y2="16.8" />
      <line x1="4.5" y1="19" x2="5.5" y2="18.8" />

      <line x1="7.5" y1="11" x2="8.5" y2="10.8" />
      <line x1="7.5" y1="13" x2="8.5" y2="12.8" />
      <line x1="7.5" y1="15" x2="8.5" y2="14.8" />
      <line x1="7.5" y1="17" x2="8.5" y2="16.8" />
      <line x1="7.5" y1="19" x2="8.5" y2="18.8" />

      <line x1="10.5" y1="17" x2="11.5" y2="16.8" />
      <line x1="10.5" y1="19" x2="11.5" y2="18.8" />

      {/* Center building windows */}
      <line x1="13.5" y1="7" x2="14.5" y2="6.8" />
      <line x1="13.5" y1="9" x2="14.5" y2="8.8" />
      <line x1="13.5" y1="11" x2="14.5" y2="10.8" />
      <line x1="13.5" y1="13" x2="14.5" y2="12.8" />
      <line x1="13.5" y1="15" x2="14.5" y2="14.8" />
      <line x1="13.5" y1="17" x2="14.5" y2="16.8" />
      <line x1="13.5" y1="19" x2="14.5" y2="18.8" />

      {/* Right side - mirror */}
      <line x1="16.5" y1="17" x2="17.5" y2="16.8" />
      <line x1="16.5" y1="19" x2="17.5" y2="18.8" />

      <line x1="19.5" y1="11" x2="20.5" y2="10.8" />
      <line x1="19.5" y1="13" x2="20.5" y2="12.8" />
      <line x1="19.5" y1="15" x2="20.5" y2="14.8" />
      <line x1="19.5" y1="17" x2="20.5" y2="16.8" />
      <line x1="19.5" y1="19" x2="20.5" y2="18.8" />

      <line x1="22.5" y1="15" x2="23.5" y2="14.8" />
      <line x1="22.5" y1="17" x2="23.5" y2="16.8" />
      <line x1="22.5" y1="19" x2="23.5" y2="18.8" />
    </g>
  </g>

  {/* Clean typography */}
  <g fill="url(#goldGradient)" fontFamily="serif" textAnchor="middle" filter="url(#emboss)">
    <text x="16" y="28" fontSize="3" fontWeight="700" letterSpacing="0.5">UNI</text>
  </g>

  {/* Subtle gold glow effect */}
  <g stroke="url(#goldGradient)" strokeWidth="0.15" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.3">
    <path d="M4 20 L4 14 L6 13.5 L6 20 Z" />
    <path d="M7 20 L7 10 L9 9.5 L9 20 Z" />
    <path d="M10 20 L10 16 L12 15.5 L12 20 Z" />
    <path d="M13 20 L13 6 L15 5.5 L15 20 Z" />
    <path d="M16 20 L16 16 L18 15.5 L18 20 Z" />
    <path d="M19 20 L19 10 L21 9.5 L21 20 Z" />
    <path d="M22 20 L22 14 L24 13.5 L24 20 Z" />
    <path d="M11 22 Q12 21 13 22 Q14 21 15 22 Q15.5 23 15 24 Q14 24.5 13 24 Q12 24.5 11 24 Q10.5 23 11 22" />
    <ellipse cx="13" cy="19" rx="1" ry="0.8" />
    <circle cx="14" cy="18" r="0.5" />
  </g>
</svg>